name: Monitor BGP AS28091

on:
  schedule:
    # Verificación silenciosa cada hora (alerta si cae un prefijo)
    - cron: "0 * * * *"
    # Informe 10:00 AM Chile = 13:00 UTC
    - cron: "0 13 * * *"
    # Informe 17:30 Chile = 20:30 UTC
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      send_report:
        description: "Forzar envío de reporte PDF"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor-bgp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Determinar modo de envío
        id: check-report
        run: |
          TRIGGER="${{ github.event_name }}"
          MANUAL="${{ github.event.inputs.send_report }}"
          SCHEDULE="${{ github.event.schedule }}"

          # Informe completo: crons dedicados (13:00 y 20:30 UTC) o manual con send_report=true
          if { [ "$TRIGGER" = "workflow_dispatch" ] && [ "$MANUAL" = "true" ]; } || \
             { [ "$TRIGGER" = "schedule" ] && { [ "$SCHEDULE" = "0 13 * * *" ] || [ "$SCHEDULE" = "30 20 * * *" ]; }; }; then
            echo "send_report=true" >> $GITHUB_OUTPUT
            echo "send_status=true" >> $GITHUB_OUTPUT
          elif [ "$TRIGGER" = "workflow_dispatch" ]; then
            echo "send_report=false" >> $GITHUB_OUTPUT
            echo "send_status=true" >> $GITHUB_OUTPUT
          else
            echo "send_report=false" >> $GITHUB_OUTPUT
            echo "send_status=false" >> $GITHUB_OUTPUT
          fi

      - name: Monitorear BGP
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          SEND_REPORT:        ${{ steps.check-report.outputs.send_report }}
          SEND_STATUS:        ${{ steps.check-report.outputs.send_status }}
        run: python bgp_monitor.py
